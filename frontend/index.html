<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon & PWA Icons -->
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Viewport — mobile-first, disable user scaling to respect our layout -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- SEO -->
    <meta name="description" content="Umoja Skills — find trusted local service providers in your community. Book plumbers, tailors, electricians, tutors and more." />

    <!-- PWA / Platform meta -->
    <meta name="theme-color" content="#4F6EF7" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="UmojaSkills" />

    <!-- Open Graph -->
    <meta property="og:title" content="Umoja Skills — Community Service Directory" />
    <meta property="og:description" content="Find and book trusted local service providers near you." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icons/icon-512.png" />

    <title>Umoja Skills — Community Service Directory</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
