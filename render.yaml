services:
  # ── Django Backend ──────────────────────────────────────────────────────────
  - type: web
    name: umoja-skills
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py migrate --noinput && python manage.py collectstatic --noinput
    startCommand: gunicorn core.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /api/health/
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: umoja-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: "*"
      - key: FRONTEND_URL
        value: "https://umoja-skills.vercel.app"
      - key: VERCEL_FRONTEND_URL
        value: "https://umoja-skills.vercel.app"

  # ── PostgreSQL Database ─────────────────────────────────────────────────────
databases:
  - name: umoja-db
    plan: free
