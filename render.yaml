services:
  # ── Django Backend ──────────────────────────────────────────────────────────
  - type: web
    name: umoja-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn core.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /api/health/
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: umoja-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: "*"
      # Set this after the frontend is deployed:
      - key: VERCEL_FRONTEND_URL
        value: "https://REPLACE_WITH_YOUR_VERCEL_URL"
      # Or if hosting frontend on Render Static Site, set:
      # - key: RENDER_FRONTEND_URL
      #   value: "https://umoja-frontend.onrender.com"

  # ── PostgreSQL Database ─────────────────────────────────────────────────────
databases:
  - name: umoja-db
    plan: free
